# Phase 2 pilot configuration
# 8 moral features + 1 nuisance, 5 conditions per model

model:
  name: claude-sonnet-4-5-20250929
  temperature: 0
  max_tokens: 8

features:
  moral:
    benefit_magnitude: [10, 100, 1000]
    harm_magnitude: [0, 1, 10]
    benefit_probability: [0.2, 0.5, 1.0]
    temporal_delay: [0, 10, 100]
    directness_of_harm: [0, 1]
    beneficiary_identified: [0, 1]
    consent_of_harmed_party: [0, 1]
    reversibility_of_harm: [0, 1]
  nuisance:
    option_order: [AB, BA]

design_matrix:
  n_candidates: 500
  seed: 42

template_families:
  - rescue_triage
  - policy_prevention
  - direct_harm_tradeoff

runs:
  sanity:
    n_items: 10
    reflection: false
  pre:
    n_items: 60
    reflection: false
  post_independent:
    n_items: 50
    conditions: [no_reflection, domain_reflection, prior_choice_reflection]
  post_sequential:
    n_items: 50
    conditions: [no_reflection]
  order_ablation:
    n_items: 30
    label_schemes: [ab, '12']
  nonmoral_order_ablation:
    n_items: 10
    label_schemes: [ab, '12']

analysis:
  cv_folds: 5
  regularization: l1
  random_seed: 42
